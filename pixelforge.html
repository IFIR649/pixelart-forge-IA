<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PixelForge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:monospace}
body{background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#top-bar{background:#16213e;border-bottom:1px solid #0f3460;padding:6px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#top-bar h1{color:#e94560;font-size:16px;letter-spacing:2px;font-weight:bold}
.mode-btn{padding:4px 14px;border:1px solid #0f3460;background:transparent;color:#aaa;cursor:pointer;font-size:12px;border-radius:3px;font-family:monospace}
.mode-btn.active{background:#0f3460;color:#e94560;border-color:#e94560}
#main{display:flex;flex:1;overflow:hidden}
#left-panel{width:180px;background:#16213e;border-right:1px solid #0f3460;display:flex;flex-direction:column;padding:8px;gap:8px;overflow-y:auto;flex-shrink:0}
#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:#0d0d1a;position:relative;overflow:hidden}
#right-panel{width:190px;background:#16213e;border-left:1px solid #0f3460;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.panel-title{font-size:10px;color:#e94560;letter-spacing:1px;text-transform:uppercase;padding:4px 0 2px;border-bottom:1px solid #0f3460;margin-bottom:6px}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;cursor:crosshair}
#grid-canvas{position:absolute;pointer-events:none;image-rendering:pixelated}
.tool-btn{width:100%;padding:5px 8px;border:1px solid #0f3460;background:transparent;color:#aaa;cursor:pointer;font-size:11px;text-align:left;border-radius:3px;font-family:monospace;margin-bottom:3px}
.tool-btn.active{background:#0f3460;color:#e2e2e2;border-color:#53a8d2}
.color-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin-bottom:6px}
.color-swatch{width:18px;height:18px;border:1px solid #333;cursor:pointer;border-radius:2px}
.color-swatch.selected{border:2px solid #fff;transform:scale(1.2)}
#custom-color{width:100%;height:28px;border:none;background:transparent;cursor:pointer;border-radius:3px}
.label{font-size:10px;color:#888;margin-bottom:3px}
input[type=number],select{width:100%;background:#0d0d1a;border:1px solid #0f3460;color:#e0e0e0;padding:4px 6px;font-size:11px;border-radius:3px;font-family:monospace;margin-bottom:4px}
#current-color-preview{width:100%;height:24px;border:1px solid #0f3460;border-radius:3px;margin-bottom:4px}
#terminal{height:160px;background:#0d0d1a;border-top:1px solid #0f3460;display:flex;flex-direction:column;flex-shrink:0}
#term-log{flex:1;overflow-y:auto;padding:6px 10px;font-size:11px;color:#0f0}
#term-log .err{color:#e94560}#term-log .info{color:#53a8d2}#term-log .ok{color:#0f0}
#term-input-row{display:flex;border-top:1px solid #0f3460}
#term-prompt{padding:6px 8px;color:#e94560;font-size:12px;flex-shrink:0}
#term-input{flex:1;background:transparent;border:none;color:#0f0;font-size:12px;font-family:monospace;outline:none;padding:6px 4px}
#frames-panel{flex:1;overflow-y:auto;padding:6px}
.frame-thumb{display:flex;align-items:center;gap:6px;padding:4px;border:1px solid #0f3460;border-radius:3px;margin-bottom:4px;cursor:pointer;background:#0d0d1a}
.frame-thumb.active{border-color:#e94560}
.frame-thumb canvas{border:1px solid #333;flex-shrink:0}
.frame-thumb span{font-size:10px;color:#aaa}
#anim-preview{padding:6px;border-bottom:1px solid #0f3460;display:none}
#anim-preview canvas{border:1px solid #0f3460;display:block;margin:0 auto}
.anim-ctrl{display:flex;gap:4px;margin-top:4px;justify-content:center;align-items:center;flex-wrap:wrap}
.anim-ctrl button{padding:2px 8px;font-size:10px;border:1px solid #0f3460;background:transparent;color:#aaa;cursor:pointer;font-family:monospace;border-radius:2px}
.anim-ctrl button.active{background:#0f3460;color:#e2e2e2}
.anim-status{font-size:10px;color:#888;text-align:center;margin-top:4px}
.timeline-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:5px}
.timeline-actions button{padding:3px 0;font-size:10px;border:1px solid #0f3460;background:#0d0d1a;color:#aaa;cursor:pointer;font-family:monospace;border-radius:2px}
.timeline-actions button:hover,.frame-mini:hover{border-color:#53a8d2;color:#e2e2e2}
.cat-section{margin-bottom:8px}
.cat-label{font-size:10px;color:#e94560;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.cat-label button{font-size:9px;border:1px solid #0f3460;background:transparent;color:#888;cursor:pointer;padding:1px 5px;border-radius:2px}
#export-panel{margin-top:auto;border-top:1px solid #0f3460;padding-top:6px}
.export-row{display:flex;gap:4px;align-items:center;margin-bottom:4px}
.export-row label,.check-row{font-size:10px;color:#888}
.check-row{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.check-row input{accent-color:#e94560}
.export-btn,#export-btn{width:100%;padding:5px;border:1px solid #e94560;background:transparent;color:#e94560;cursor:pointer;font-size:11px;border-radius:3px;font-family:monospace;margin-bottom:3px;text-align:center}
.export-btn:hover,#export-btn:hover{background:#e94560;color:#000}
.frame-mini{margin-left:auto;background:transparent;border:1px solid #0f3460;color:#888;cursor:pointer;font-family:monospace;font-size:10px;border-radius:2px;padding:1px 5px}
#zoom-info{position:absolute;bottom:8px;right:8px;font-size:10px;color:#555;pointer-events:none}
#coords-info{position:absolute;bottom:8px;left:8px;font-size:10px;color:#555;pointer-events:none}
</style>
</head>
<body>

<div id="top-bar">
  <h1>PIXELFORGE</h1>
  <button class="mode-btn active" id="btn-pixelart" onclick="setMode('pixelart')">PIXEL ART</button>
  <button class="mode-btn" id="btn-sprite" onclick="setMode('sprite')">SPRITE ANIMATOR</button>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <span class="label" style="margin:0">Size:</span>
    <select id="canvas-size" onchange="resizeCanvas()" style="width:90px;margin:0">
      <option value="16">16x16</option>
      <option value="32" selected>32x32</option>
      <option value="48">48x48</option>
      <option value="64">64x64</option>
    </select>
    <button class="tool-btn" style="width:auto;margin:0;padding:4px 10px" onclick="clearCanvas()">CLR</button>
  </div>
</div>

<div id="main">
  <div id="left-panel">
    <div>
      <div class="panel-title">Tools</div>
      <button class="tool-btn active" id="t-pencil" onclick="setTool('pencil')">✏ Pencil</button>
      <button class="tool-btn" id="t-eraser" onclick="setTool('eraser')">⌫ Eraser</button>
      <button class="tool-btn" id="t-fill" onclick="setTool('fill')">▣ Fill</button>
      <button class="tool-btn" id="t-eyedrop" onclick="setTool('eyedrop')">◎ Eyedrop</button>
      <button class="tool-btn" id="t-rect" onclick="setTool('rect')">□ Rectangle</button>
      <button class="tool-btn" id="t-line" onclick="setTool('line')">╲ Line</button>
    </div>
    <div>
      <div class="panel-title">Color</div>
      <div id="current-color-preview"></div>
      <div class="color-grid" id="palette"></div>
      <div class="label">Custom</div>
      <input type="color" id="custom-color" value="#e94560" onchange="setColor(this.value)">
      <div class="label">R/G/B</div>
      <div style="display:flex;gap:3px">
        <input type="number" id="inp-r" min="0" max="255" value="233" onchange="setFromRGB()" style="width:56px">
        <input type="number" id="inp-g" min="0" max="255" value="69" onchange="setFromRGB()" style="width:56px">
        <input type="number" id="inp-b" min="0" max="255" value="96" onchange="setFromRGB()" style="width:56px">
      </div>
      <div class="label">HEX</div>
      <input type="text" id="inp-hex" value="#e94560" onchange="setColor(this.value)" style="font-family:monospace">
      <div class="label">Alpha</div>
      <input type="range" id="inp-alpha" min="0" max="255" value="255" style="width:100%;margin-bottom:4px" oninput="updateAlpha(this.value)">
    </div>
    <div>
      <div class="panel-title">Background</div>
      <input type="color" id="bg-color" value="#000000" onchange="setBgColor(this.value)" style="width:100%;height:24px;border:none;background:transparent;cursor:pointer">
      <div style="display:flex;gap:4px;margin-top:4px">
        <button class="tool-btn" style="width:50%" onclick="setBgColor('#000000')">Black</button>
        <button class="tool-btn" style="width:50%" onclick="setBgColor('transparent')">Trans</button>
      </div>
    </div>
    <div>
      <div class="panel-title">Zoom</div>
      <div style="display:flex;gap:4px">
        <button class="tool-btn" style="width:50%" onclick="changeZoom(-2)">-</button>
        <button class="tool-btn" style="width:50%" onclick="changeZoom(2)">+</button>
      </div>
    </div>
    <div id="export-panel">
      <div class="panel-title">Export</div>
      <div class="export-row">
        <label for="export-max">Max</label>
        <input type="number" id="export-max" min="1" max="2400" value="2400" onchange="setExportMax(this.value)" style="margin:0">
      </div>
      <label class="check-row"><input type="checkbox" id="export-bg" checked onchange="updateExportBg()"> BG actual</label>
      <button id="export-btn" onclick="exportPNG()">Frame PNG</button>
      <button class="export-btn" onclick="exportAllFrames()">All Frames</button>
      <div class="export-row">
        <label for="sheet-cols">Cols</label>
        <input type="number" id="sheet-cols" min="1" max="64" value="4" style="margin:0">
      </div>
      <button class="export-btn" onclick="exportSpriteSheet()">Spritesheet</button>
    </div>
  </div>

  <div id="canvas-area">
    <canvas id="main-canvas"></canvas>
    <canvas id="grid-canvas"></canvas>
    <div id="zoom-info">zoom: 10x</div>
    <div id="coords-info">x:0 y:0</div>
  </div>

  <div id="right-panel">
    <div id="anim-preview">
      <div class="panel-title">Preview</div>
      <canvas id="preview-canvas" width="64" height="64"></canvas>
      <div class="anim-ctrl">
        <button id="btn-play" onclick="togglePlay()">▶ Play</button>
        <span style="font-size:10px;color:#888">FPS:</span>
        <input type="number" id="fps-input" value="8" min="1" max="60" style="width:40px;margin:0" onchange="updateFPS()">
      </div>
      <div id="anim-status" class="anim-status">Frame 1 / 1</div>
      <div class="timeline-actions">
        <button onclick="moveFrameLeft()" title="Move frame left">&lt;</button>
        <button onclick="duplicateFrame()" title="Duplicate frame">Dup</button>
        <button onclick="deleteFrame(currentFrame)" title="Delete frame">Del</button>
        <button onclick="moveFrameRight()" title="Move frame right">&gt;</button>
      </div>
    </div>
    <div id="frames-panel">
      <div id="sprite-controls" style="display:none">
        <div class="panel-title">Animations</div>
        <div id="cats-list"></div>
        <button class="tool-btn" onclick="addCategory()">+ Category</button>
      </div>
      <div id="pixelart-controls">
        <div class="panel-title">Frames</div>
        <div id="frames-list"></div>
        <button class="tool-btn" onclick="addFrame()">+ Frame</button>
      </div>
    </div>
  </div>
</div>

<div id="terminal">
  <div id="term-log"></div>
  <div id="term-input-row">
    <span id="term-prompt">PF&gt;</span>
    <input type="text" id="term-input" placeholder="Command (help for list)..." onkeydown="handleTermKey(event)">
  </div>
</div>

<script>
const PALETTE = ['#000000','#ffffff','#ff0000','#00ff00','#0000ff','#ffff00','#ff00ff','#00ffff',
'#ff8800','#8800ff','#00ff88','#ff0088','#888888','#444444','#cccccc','#e94560',
'#16213e','#0f3460','#53a8d2','#2d6a4f','#1b4332','#d4a017','#8b0000','#006400',
'#1a1a2e','#ffd700','#ff69b4','#7b2d8b','#e07b39','#3d5a80','#98c1d9','#ee6c4d'];

let mode='pixelart', tool='pencil', currentColor='#e94560', currentAlpha=255, brushSize=1, strokeSize=1;
let gridSize=32, zoom=10, isDrawing=false, lastX=-1, lastY=-1;
let bgColor='#000000', showGrid=true;
let frames=[], currentFrame=0;
let categories=[{name:'idle',frames:[]}], currentCat=0;
let animPlaying=false, animFrame=0, animTimer=null, fps=8;
let startX=-1, startY=-1, previewPixels=null, clipboardPixels=null;
let exportMax=2400, exportIncludeBg=true;

const mc=document.getElementById('main-canvas');
const gc=document.getElementById('grid-canvas');
const ctx=mc.getContext('2d');
const gctx=gc.getContext('2d');
const pvc=document.getElementById('preview-canvas');
const pvctx=pvc.getContext('2d');

function init(){
  buildPalette();
  resizeCanvas();
  setColor('#e94560');
}

function buildPalette(){
  const g=document.getElementById('palette');
  g.innerHTML='';
  PALETTE.forEach(c=>{
    const d=document.createElement('div');
    d.className='color-swatch';
    d.style.background=c;
    d.onclick=()=>setColor(c);
    d.title=c;
    g.appendChild(d);
  });
}

function resizeCanvas(){
  gridSize=parseInt(document.getElementById('canvas-size').value);
  const px=gridSize*zoom;
  mc.width=gridSize; mc.height=gridSize;
  mc.style.width=px+'px'; mc.style.height=px+'px';
  gc.width=px; gc.height=px;
  gc.style.width=px+'px'; gc.style.height=px+'px';
  gc.style.position='absolute';
  gc.style.top=mc.offsetTop+'px';
  gc.style.left=mc.offsetLeft+'px';
  frames=[]; currentFrame=0;
  addFrame(true);
  drawGrid();
  log('Canvas resized to '+gridSize+'x'+gridSize,'info');
}

function changeZoom(d){
  zoom=Math.max(4,Math.min(24,zoom+d));
  const px=gridSize*zoom;
  mc.style.width=px+'px'; mc.style.height=px+'px';
  gc.width=px; gc.height=px;
  gc.style.width=px+'px'; gc.style.height=px+'px';
  drawGrid();
  document.getElementById('zoom-info').textContent='zoom: '+zoom+'x';
}

function drawGrid(){
  gctx.clearRect(0,0,gc.width,gc.height);
  gctx.strokeStyle='rgba(255,255,255,0.08)';
  gctx.lineWidth=0.5;
  for(let i=0;i<=gridSize;i++){
    gctx.beginPath(); gctx.moveTo(i*zoom,0); gctx.lineTo(i*zoom,gc.height); gctx.stroke();
    gctx.beginPath(); gctx.moveTo(0,i*zoom); gctx.lineTo(gc.width,i*zoom); gctx.stroke();
  }
}

function getPos(e){
  const r=mc.getBoundingClientRect();
  const sx=(e.clientX-r.left)/r.width, sy=(e.clientY-r.top)/r.height;
  return [Math.floor(sx*gridSize), Math.floor(sy*gridSize)];
}

function hexToRgba(hex,a=255){
  let h=hex.replace('#','');
  if(h.length===3)h=h.split('').map(x=>x+x).join('');
  if(h.length===4)h=h.split('').map(x=>x+x).join('');
  if(h.length===8){
    return [
      parseInt(h.slice(0,2),16),
      parseInt(h.slice(2,4),16),
      parseInt(h.slice(4,6),16),
      parseInt(h.slice(6,8),16)
    ];
  }
  const n=parseInt(h,16);
  return [n>>16&255,(n>>8)&255,n&255,a];
}

function paintPixel(x,y,color=currentColor,a=currentAlpha){
  if(x<0||y<0||x>=gridSize||y>=gridSize)return false;
  if(color==='transparent'||a===0){
    ctx.clearRect(x,y,1,1);
  } else {
    const [r,g,b,pa]=hexToRgba(color,a);
    ctx.fillStyle=`rgba(${r},${g},${b},${pa/255})`;
    ctx.fillRect(x,y,1,1);
  }
  return true;
}

function parseIntValue(v){
  const n=parseInt(v,10);
  return Number.isFinite(n)?n:null;
}

function isColorArg(v){
  return typeof v==='string'&&(v.toLowerCase()==='transparent'||v.startsWith('#'));
}

function splitTrailingColor(args){
  const values=args.slice();
  let color=null;
  if(values.length&&isColorArg(values[values.length-1])) color=values.pop();
  return {values,color};
}

function validSize(v,min=1,max=32){
  const n=parseIntValue(v);
  if(n===null||n<min||n>max)return null;
  return n;
}

function parseNumberList(values){
  return values.map(parseIntValue);
}

function parsePointArgs(args,minPoints=2){
  const parsed=splitTrailingColor(args);
  const values=parseNumberList(parsed.values);
  if(values.length<minPoints*2||values.length%2!==0||values.some(v=>v===null))return null;
  const points=[];
  for(let i=0;i<values.length;i+=2) points.push([values[i],values[i+1]]);
  return {points,color:parsed.color};
}

function rgbHex(color){
  const [r,g,b]=hexToRgba(color);
  return [r,g,b];
}

function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}

function blendHex(from,to,t){
  const a=rgbHex(from),b=rgbHex(to);
  return rgbToHex(
    a[0]+(b[0]-a[0])*t,
    a[1]+(b[1]-a[1])*t,
    a[2]+(b[2]-a[2])*t
  );
}

function paintBlockXY(x,y,w,h,color=currentColor,a=currentAlpha){
  let changed=false;
  for(let yy=0;yy<h;yy++){
    for(let xx=0;xx<w;xx++){
      changed=paintPixel(x+xx,y+yy,color,a)||changed;
    }
  }
  return changed;
}

function paintCenteredBlock(cx,cy,w,h,color=currentColor,a=currentAlpha){
  const x=Math.floor(cx-(w-1)/2);
  const y=Math.floor(cy-(h-1)/2);
  return paintBlockXY(x,y,w,h,color,a);
}

function paintStrokePixel(x,y,color=currentColor,a=currentAlpha,size=strokeSize){
  if(size<=1)return paintPixel(x,y,color,a);
  return paintCenteredBlock(x,y,size,size,color,a);
}

function clampSelection(x,y,w,h){
  const x0=Math.max(0,Math.min(gridSize,x));
  const y0=Math.max(0,Math.min(gridSize,y));
  const x1=Math.max(0,Math.min(gridSize,x+w));
  const y1=Math.max(0,Math.min(gridSize,y+h));
  return {x:x0,y:y0,w:Math.max(0,x1-x0),h:Math.max(0,y1-y0)};
}

function clearSelection(x,y,w,h){
  const s=clampSelection(x,y,w,h);
  if(!s.w||!s.h)return false;
  ctx.clearRect(s.x,s.y,s.w,s.h);
  return true;
}

function copySelection(x,y,w,h){
  const s=clampSelection(x,y,w,h);
  if(!s.w||!s.h)return null;
  return {width:s.w,height:s.h,data:ctx.getImageData(s.x,s.y,s.w,s.h)};
}

function pasteSelection(x,y,clip){
  if(!clip)return false;
  ctx.putImageData(clip.data,x,y);
  return true;
}

function mirrorSelection(x,y,w,h,axis){
  const clip=copySelection(x,y,w,h);
  if(!clip)return false;
  const out=ctx.createImageData(clip.width,clip.height);
  const src=clip.data.data,dst=out.data;
  for(let yy=0;yy<clip.height;yy++){
    for(let xx=0;xx<clip.width;xx++){
      const sx=axis==='x'?clip.width-1-xx:xx;
      const sy=axis==='y'?clip.height-1-yy:yy;
      const si=(sy*clip.width+sx)*4,di=(yy*clip.width+xx)*4;
      dst[di]=src[si];dst[di+1]=src[si+1];dst[di+2]=src[si+2];dst[di+3]=src[si+3];
    }
  }
  ctx.putImageData(out,x,y);
  return true;
}

function rotateSelection90(x,y,w,h,dir='cw'){
  const clip=copySelection(x,y,w,h);
  if(!clip)return false;
  const out=ctx.createImageData(clip.height,clip.width);
  const src=clip.data.data,dst=out.data;
  for(let yy=0;yy<clip.height;yy++){
    for(let xx=0;xx<clip.width;xx++){
      const dx=dir==='ccw'?yy:clip.height-1-yy;
      const dy=dir==='ccw'?clip.width-1-xx:xx;
      const si=(yy*clip.width+xx)*4,di=(dy*out.width+dx)*4;
      dst[di]=src[si];dst[di+1]=src[si+1];dst[di+2]=src[si+2];dst[di+3]=src[si+3];
    }
  }
  clearSelection(x,y,w,h);
  ctx.putImageData(out,x,y);
  return true;
}

function drawPixel(x,y,color=currentColor,a=currentAlpha){
  if(paintCenteredBlock(x,y,brushSize,brushSize,color,a)) saveFrameData();
}

function erasePixel(x,y){
  if(paintCenteredBlock(x,y,brushSize,brushSize,'transparent',0)) saveFrameData();
}

function fill(x,y,targetColor,fillColor){
  if(x<0||y<0||x>=gridSize||y>=gridSize)return;
  const img=ctx.getImageData(0,0,gridSize,gridSize);
  const d=img.data;
  const idx=(y*gridSize+x)*4;
  const [tr,tg,tb,ta]=[d[idx],d[idx+1],d[idx+2],d[idx+3]];
  if(fillColor===targetColor)return;
  const [fr,fg,fb,fa]=hexToRgba(fillColor,currentAlpha);
  const stack=[[x,y]];
  const visited=new Set();
  while(stack.length){
    const [cx,cy]=stack.pop();
    if(cx<0||cy<0||cx>=gridSize||cy>=gridSize)continue;
    const k=cy*gridSize+cx;
    if(visited.has(k))continue;
    visited.add(k);
    const i=k*4;
    if(d[i]!==tr||d[i+1]!==tg||d[i+2]!==tb||d[i+3]!==ta)continue;
    d[i]=fr;d[i+1]=fg;d[i+2]=fb;d[i+3]=fa;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(img,0,0);
  saveFrameData();
}

function drawLinePixels(x0,y0,x1,y1,color=currentColor,a=currentAlpha,size=strokeSize){
  let dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
  let sx=x0<x1?1:-1,sy=y0<y1?1:-1,err=dx-dy;
  while(true){
    paintStrokePixel(x0,y0,color,a,size);
    if(x0===x1&&y0===y1)break;
    let e2=2*err;
    if(e2>-dy){err-=dy;x0+=sx;}
    if(e2<dx){err+=dx;y0+=sy;}
  }
}

function drawRect(x0,y0,x1,y1,color=currentColor,a=currentAlpha,size=strokeSize){
  const minx=Math.min(x0,x1),maxx=Math.max(x0,x1);
  const miny=Math.min(y0,y1),maxy=Math.max(y0,y1);
  for(let x=minx;x<=maxx;x++){paintStrokePixel(x,miny,color,a,size);paintStrokePixel(x,maxy,color,a,size);}
  for(let y=miny;y<=maxy;y++){paintStrokePixel(minx,y,color,a,size);paintStrokePixel(maxx,y,color,a,size);}
}

function fillRectInclusive(x0,y0,x1,y1,color=currentColor,a=currentAlpha){
  let changed=false;
  const minx=Math.min(x0,x1),maxx=Math.max(x0,x1);
  const miny=Math.min(y0,y1),maxy=Math.max(y0,y1);
  for(let y=miny;y<=maxy;y++){
    for(let x=minx;x<=maxx;x++){
      changed=paintPixel(x,y,color,a)||changed;
    }
  }
  return changed;
}

function drawFilledCircle(cx,cy,r,color=currentColor,a=currentAlpha){
  let changed=false;
  for(let y=-r;y<=r;y++){
    for(let x=-r;x<=r;x++){
      if(x*x+y*y<=r*r) changed=paintPixel(cx+x,cy+y,color,a)||changed;
    }
  }
  return changed;
}

function drawCirclePixels(cx,cy,r,color=currentColor,a=currentAlpha,size=strokeSize){
  let x=r,y=0,err=0;
  while(x>=y){
    [[cx+x,cy+y],[cx+y,cy+x],[cx-y,cy+x],[cx-x,cy+y],[cx-x,cy-y],[cx-y,cy-x],[cx+y,cy-x],[cx+x,cy-y]].forEach(([px,py])=>paintStrokePixel(px,py,color,a,size));
    if(err<=0){y++;err+=2*y+1;}else{x--;err-=2*x+1;}
  }
}

function drawEllipsePixels(cx,cy,rx,ry,color=currentColor,a=currentAlpha,size=strokeSize){
  const steps=Math.max(12,Math.ceil(Math.max(rx,ry)*8));
  let prev=null;
  for(let i=0;i<=steps;i++){
    const t=(Math.PI*2*i)/steps;
    const x=Math.round(cx+Math.cos(t)*rx);
    const y=Math.round(cy+Math.sin(t)*ry);
    if(!prev) paintStrokePixel(x,y,color,a,size);
    else if(prev[0]!==x||prev[1]!==y) drawLinePixels(prev[0],prev[1],x,y,color,a,size);
    prev=[x,y];
  }
}

function drawFilledEllipse(cx,cy,rx,ry,color=currentColor,a=currentAlpha){
  let changed=false;
  const rx2=rx*rx, ry2=ry*ry, limit=rx2*ry2;
  for(let y=-ry;y<=ry;y++){
    for(let x=-rx;x<=rx;x++){
      if(x*x*ry2+y*y*rx2<=limit) changed=paintPixel(cx+x,cy+y,color,a)||changed;
    }
  }
  return changed;
}

function drawPolylinePixels(points,color=currentColor,a=currentAlpha,size=strokeSize){
  for(let i=0;i<points.length-1;i++){
    drawLinePixels(points[i][0],points[i][1],points[i+1][0],points[i+1][1],color,a,size);
  }
}

function drawPolygonPixels(points,color=currentColor,a=currentAlpha,size=strokeSize){
  drawPolylinePixels(points,color,a,size);
  const first=points[0],last=points[points.length-1];
  drawLinePixels(last[0],last[1],first[0],first[1],color,a,size);
}

function fillPolygonPixels(points,color=currentColor,a=currentAlpha){
  let changed=false;
  const ys=points.map(p=>p[1]);
  const minY=Math.max(0,Math.floor(Math.min(...ys)));
  const maxY=Math.min(gridSize-1,Math.ceil(Math.max(...ys)));
  for(let y=minY;y<=maxY;y++){
    const scanY=y+0.5;
    const xs=[];
    for(let i=0,j=points.length-1;i<points.length;j=i++){
      const [xi,yi]=points[i], [xj,yj]=points[j];
      if((yi>scanY)!==(yj>scanY)){
        xs.push(xi+(scanY-yi)*(xj-xi)/(yj-yi));
      }
    }
    xs.sort((a,b)=>a-b);
    for(let i=0;i<xs.length;i+=2){
      const xStart=Math.max(0,Math.ceil(xs[i]));
      const xEnd=Math.min(gridSize-1,Math.floor(xs[i+1]));
      for(let x=xStart;x<=xEnd;x++) changed=paintPixel(x,y,color,a)||changed;
    }
  }
  return changed;
}

function drawArcPixels(cx,cy,rx,ry,startDeg,endDeg,color=currentColor,a=currentAlpha,size=strokeSize){
  let span=endDeg-startDeg;
  if(span===0)return;
  const dir=span>=0?1:-1;
  const steps=Math.max(2,Math.ceil(Math.max(rx,ry)*Math.abs(span)/45));
  let prev=null;
  for(let i=0;i<=steps;i++){
    const deg=startDeg+(Math.abs(span)*i/steps)*dir;
    const t=deg*Math.PI/180;
    const x=Math.round(cx+Math.cos(t)*rx);
    const y=Math.round(cy+Math.sin(t)*ry);
    if(!prev) paintStrokePixel(x,y,color,a,size);
    else if(prev[0]!==x||prev[1]!==y) drawLinePixels(prev[0],prev[1],x,y,color,a,size);
    prev=[x,y];
  }
}

function drawCurvePixels(x0,y0,cx,cy,x1,y1,color=currentColor,a=currentAlpha,size=strokeSize){
  const dist=Math.abs(x1-x0)+Math.abs(y1-y0)+Math.abs(cx-x0)+Math.abs(cy-y0);
  const steps=Math.max(8,Math.ceil(dist/2));
  let prev=null;
  for(let i=0;i<=steps;i++){
    const t=i/steps,mt=1-t;
    const x=Math.round(mt*mt*x0+2*mt*t*cx+t*t*x1);
    const y=Math.round(mt*mt*y0+2*mt*t*cy+t*t*y1);
    if(!prev) paintStrokePixel(x,y,color,a,size);
    else if(prev[0]!==x||prev[1]!==y) drawLinePixels(prev[0],prev[1],x,y,color,a,size);
    prev=[x,y];
  }
}

function drawGradientRect(x,y,w,h,from,to,dir='v'){
  let changed=false;
  for(let yy=0;yy<h;yy++){
    for(let xx=0;xx<w;xx++){
      const denom=dir==='h'?Math.max(1,w-1):Math.max(1,h-1);
      const t=(dir==='h'?xx:yy)/denom;
      changed=paintPixel(x+xx,y+yy,blendHex(from,to,t),currentAlpha)||changed;
    }
  }
  return changed;
}

mc.addEventListener('mousedown',e=>{
  isDrawing=true;
  const [x,y]=getPos(e);
  startX=x; startY=y;
  if(tool==='line'||tool==='rect') previewPixels=ctx.getImageData(0,0,gridSize,gridSize);
  if(tool==='pencil') drawPixel(x,y);
  else if(tool==='eraser') erasePixel(x,y);
  else if(tool==='fill'){
    const img=ctx.getImageData(0,0,gridSize,gridSize);
    const d=img.data, idx=(y*gridSize+x)*4;
    fill(x,y,null,currentColor);
  }
  else if(tool==='eyedrop'){
    const img=ctx.getImageData(x,y,1,1).data;
    if(img[3]>0){
      const h='#'+[img[0],img[1],img[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
      setColor(h); log('Picked: '+h,'info');
    }
    isDrawing=false;
  }
  lastX=x; lastY=y;
});

mc.addEventListener('mousemove',e=>{
  const [x,y]=getPos(e);
  document.getElementById('coords-info').textContent='x:'+x+' y:'+y;
  if(!isDrawing)return;
  if(tool==='pencil'){if(x!==lastX||y!==lastY)drawPixel(x,y);}
  else if(tool==='eraser'){if(x!==lastX||y!==lastY)erasePixel(x,y);}
  else if(tool==='line'||tool==='rect'){
    ctx.putImageData(previewPixels,0,0);
    if(tool==='line') drawLinePixels(startX,startY,x,y);
    else drawRect(startX,startY,x,y);
  }
  lastX=x; lastY=y;
});

mc.addEventListener('mouseup',e=>{
  if(!isDrawing)return;
  isDrawing=false;
  const [x,y]=getPos(e);
  if((tool==='line'||tool==='rect')&&previewPixels){
    ctx.putImageData(previewPixels,0,0);
    previewPixels=null;
    if(tool==='line') drawLinePixels(startX,startY,x,y);
    else drawRect(startX,startY,x,y);
    saveFrameData();
  }
});

mc.addEventListener('mouseleave',()=>{
  if(previewPixels){
    ctx.putImageData(previewPixels,0,0);
    previewPixels=null;
  }
  isDrawing=false;
});

function saveFrameData(){
  const data=ctx.getImageData(0,0,gridSize,gridSize);
  if(mode==='pixelart'){
    frames[currentFrame]=data;
    updateFrameThumb(currentFrame);
  } else {
    const cat=categories[currentCat];
    cat.frames[currentFrame]=data;
    updateFrameThumb(currentFrame);
    if(!animPlaying)animFrame=currentFrame;
    updateAnimPreview();
  }
  updateAnimStatus();
}

function setTool(t){
  tool=t;
  document.querySelectorAll('.tool-btn[id^=t-]').forEach(b=>b.classList.remove('active'));
  const b=document.getElementById('t-'+t);
  if(b)b.classList.add('active');
}

function setColor(hex){
  if(!hex||hex==='transparent')return;
  hex=hex.trim();
  if(!hex.startsWith('#'))hex='#'+hex;
  currentColor=hex;
  document.getElementById('current-color-preview').style.background=hex;
  document.getElementById('custom-color').value=hex;
  document.getElementById('inp-hex').value=hex;
  try{
    const [r,g,b]=hexToRgba(hex);
    document.getElementById('inp-r').value=r;
    document.getElementById('inp-g').value=g;
    document.getElementById('inp-b').value=b;
  }catch(e){}
  document.querySelectorAll('.color-swatch').forEach(s=>{
    s.classList.toggle('selected',s.style.background===hex||s.style.background===hexToRgb(hex));
  });
}

function hexToRgb(hex){
  try{const [r,g,b]=hexToRgba(hex);return`rgb(${r}, ${g}, ${b})`;}catch(e){return'';}
}

function setFromRGB(){
  const r=parseInt(document.getElementById('inp-r').value)||0;
  const g=parseInt(document.getElementById('inp-g').value)||0;
  const b=parseInt(document.getElementById('inp-b').value)||0;
  const hex='#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
  setColor(hex);
}

function updateAlpha(v){currentAlpha=parseInt(v);}

function setBgColor(c){
  bgColor=c;
  mc.style.background=c;
  document.getElementById('bg-color').value=c==='transparent'?'#000000':c;
}

function setMode(m){
  mode=m;
  document.getElementById('btn-pixelart').classList.toggle('active',m==='pixelart');
  document.getElementById('btn-sprite').classList.toggle('active',m==='sprite');
  document.getElementById('sprite-controls').style.display=m==='sprite'?'block':'none';
  document.getElementById('pixelart-controls').style.display=m==='pixelart'?'block':'none';
  document.getElementById('anim-preview').style.display=m==='sprite'?'block':'none';
  if(m==='sprite'){renderCats();} else renderFrameList();
  updateAnimStatus();
  updateAnimPreview();
  log('Mode: '+m,'info');
}

function getActiveFrameList(){
  return mode==='pixelart'?frames:(categories[currentCat]?.frames||[]);
}

function getActiveExportName(){
  if(mode==='sprite')return categories[currentCat]?.name||'sprite';
  return 'pixelart';
}

function loadActiveFrame(i){
  if(mode==='sprite')loadSpriteFrame(i);
  else loadFrame(i);
}

function cloneImageData(imgData){
  if(!imgData)return null;
  return new ImageData(new Uint8ClampedArray(imgData.data),imgData.width,imgData.height);
}

function addFrame(silent=false){
  if(mode==='pixelart'){
    frames.push(null);
    loadFrame(frames.length-1);
    renderFrameList();
    if(!silent)log('Frame '+(frames.length)+' added','ok');
  } else {
    const cat=categories[currentCat];
    cat.frames.push(null);
    loadSpriteFrame(cat.frames.length-1);
    renderCats();
    if(!silent)log('Frame added to '+cat.name,'ok');
  }
}

function loadFrame(i){
  const list=getActiveFrameList();
  if(!list.length)return;
  currentFrame=Math.max(0,Math.min(parseInt(i)||0,list.length-1));
  ctx.clearRect(0,0,gridSize,gridSize);
  if(mode==='pixelart'&&frames[currentFrame]){
    ctx.putImageData(frames[currentFrame],0,0);
  } else if(mode==='sprite'){
    const d=categories[currentCat]?.frames[currentFrame];
    if(d)ctx.putImageData(d,0,0);
  }
  if(mode==='pixelart')renderFrameList();
  else {
    animFrame=currentFrame;
    renderCats();
    updateAnimPreview();
  }
  updateAnimStatus();
}

function loadSpriteFrame(i){
  loadFrame(i);
}

function renderFrameList(){
  const list=document.getElementById('frames-list');
  list.innerHTML='';
  frames.forEach((f,i)=>{
    const row=document.createElement('div');
    row.className='frame-thumb'+(i===currentFrame?' active':'');
    const c=document.createElement('canvas');
    c.width=32; c.height=32; c.style.width='32px'; c.style.height='32px';
    c.style.imageRendering='pixelated';
    if(f) c.getContext('2d').putImageData(scaleImageData(f,32),0,0);
    const s=document.createElement('span');
    s.textContent='Frame '+(i+1);
    const del=document.createElement('button');
    del.textContent='x';
    del.className='frame-mini';
    del.title='Delete frame';
    del.onclick=e=>{e.stopPropagation();deleteFrame(i);};
    row.appendChild(c); row.appendChild(s); row.appendChild(del);
    row.addEventListener('click',()=>loadFrame(i));
    list.appendChild(row);
  });
  updateAnimStatus();
}

function scaleImageData(imgData,size){
  const tmp=document.createElement('canvas');
  tmp.width=gridSize; tmp.height=gridSize;
  tmp.getContext('2d').putImageData(imgData,0,0);
  const out=document.createElement('canvas');
  out.width=size; out.height=size;
  const oc=out.getContext('2d');
  oc.imageSmoothingEnabled=false;
  oc.drawImage(tmp,0,0,size,size);
  return oc.getImageData(0,0,size,size);
}

function updateFrameThumb(i){
  if(mode==='pixelart') renderFrameList();
  else renderCats();
}

function deleteFrame(i){
  const list=getActiveFrameList();
  if(!list.length)return;
  i=parseInt(i);
  if(isNaN(i))i=currentFrame;
  if(i<0||i>=list.length){log('Frame out of range','err');return;}
  if(mode==='pixelart'){
    if(frames.length===1)frames[0]=null;
    else frames.splice(i,1);
  } else {
    const cat=categories[currentCat];
    if(cat.frames.length===1)cat.frames[0]=null;
    else cat.frames.splice(i,1);
  }
  currentFrame=Math.min(i,getActiveFrameList().length-1);
  loadActiveFrame(currentFrame);
  log('Frame deleted','ok');
}

function duplicateFrame(){
  saveFrameData();
  const list=getActiveFrameList();
  if(!list.length)return;
  const copy=cloneImageData(list[currentFrame]);
  list.splice(currentFrame+1,0,copy);
  loadActiveFrame(currentFrame+1);
  log('Frame duplicated','ok');
}

function moveFrame(from,to){
  const list=getActiveFrameList();
  from=parseInt(from);to=parseInt(to);
  if(isNaN(from)||isNaN(to)){log('Usage: moveframe <from> <to>','err');return false;}
  from-=1;to-=1;
  if(from<0||from>=list.length||to<0||to>=list.length){log('Frame out of range','err');return false;}
  if(from===to)return true;
  saveFrameData();
  const item=list.splice(from,1)[0];
  list.splice(to,0,item);
  loadActiveFrame(to);
  log('Frame moved '+(from+1)+' -> '+(to+1),'ok');
  return true;
}

function moveFrameLeft(){
  if(currentFrame<=0){log('Already at first frame','err');return;}
  moveFrame(currentFrame+1,currentFrame);
}

function moveFrameRight(){
  const list=getActiveFrameList();
  if(currentFrame>=list.length-1){log('Already at last frame','err');return;}
  moveFrame(currentFrame+1,currentFrame+2);
}

function addCategory(){
  const name=prompt('Category name (idle, walk, attack...):','idle');
  if(!name)return;
  categories.push({name,frames:[]});
  currentCat=categories.length-1;
  addFrame(true);
  renderCats();
  log('Category '+name+' created','ok');
}

function renderCats(){
  const list=document.getElementById('cats-list');
  list.innerHTML='';
  categories.forEach((cat,ci)=>{
    const sec=document.createElement('div');
    sec.className='cat-section';
    const lbl=document.createElement('div');
    lbl.className='cat-label';
    const name=document.createElement('span');
    name.textContent=cat.name;
    lbl.appendChild(name);
    const addBtn=document.createElement('button');
    addBtn.textContent='+frame';
    addBtn.onclick=()=>{currentCat=ci;addFrame();};
    lbl.appendChild(addBtn);
    sec.appendChild(lbl);
    cat.frames.forEach((f,fi)=>{
      const row=document.createElement('div');
      row.className='frame-thumb'+((ci===currentCat&&fi===currentFrame)?' active':'');
      const c=document.createElement('canvas');
      c.width=32; c.height=32; c.style.width='32px'; c.style.height='32px';
      c.style.imageRendering='pixelated';
      if(f) c.getContext('2d').putImageData(scaleImageData(f,32),0,0);
      const s=document.createElement('span');
      s.textContent=cat.name+'.'+(fi+1);
      const del=document.createElement('button');
      del.textContent='x';
      del.className='frame-mini';
      del.title='Delete frame';
      del.onclick=e=>{e.stopPropagation();currentCat=ci;deleteFrame(fi);};
      row.appendChild(c); row.appendChild(s); row.appendChild(del);
      row.addEventListener('click',()=>{currentCat=ci;loadSpriteFrame(fi);});
      sec.appendChild(row);
    });
    list.appendChild(sec);
  });
  updateAnimStatus();
}

function togglePlay(){
  animPlaying=!animPlaying;
  document.getElementById('btn-play').textContent=animPlaying?'⏹ Stop':'▶ Play';
  if(animPlaying) startAnim(); else stopAnim();
}

function startAnim(){
  stopAnim();
  animTimer=setInterval(()=>{
    const cat=categories[currentCat];
    if(!cat||!cat.frames.length)return;
    animFrame=(animFrame+1)%cat.frames.length;
    updateAnimPreview();
  },1000/fps);
}

function stopAnim(){clearInterval(animTimer);}

function setFPSValue(value){
  const n=parseInt(value);
  if(isNaN(n)||n<1||n>60){log('Usage: setfps <1-60>','err');return false;}
  fps=n;
  const input=document.getElementById('fps-input');
  if(input)input.value=fps;
  if(animPlaying){stopAnim();startAnim();}
  updateAnimStatus();
  return true;
}

function updateFPS(){setFPSValue(document.getElementById('fps-input').value);}

function updateAnimStatus(){
  const el=document.getElementById('anim-status');
  if(!el)return;
  const list=getActiveFrameList();
  const count=list.length||1;
  el.textContent='Frame '+(Math.min(currentFrame+1,count))+' / '+count+' · '+fps+' FPS';
}

function updateAnimPreview(){
  const cat=categories[currentCat];
  if(!cat)return;
  if(!animPlaying)animFrame=currentFrame;
  const f=cat.frames[animFrame];
  pvctx.clearRect(0,0,64,64);
  if(f){
    const tmp=document.createElement('canvas');
    tmp.width=gridSize; tmp.height=gridSize;
    tmp.getContext('2d').putImageData(f,0,0);
    pvctx.imageSmoothingEnabled=false;
    pvctx.drawImage(tmp,0,0,64,64);
  }
}

function clearCanvas(){
  ctx.clearRect(0,0,gridSize,gridSize);
  saveFrameData();
  log('Canvas cleared','info');
}

function setExportMax(value,silent=false){
  const n=parseInt(value);
  if(isNaN(n)||n<1||n>2400){
    log('Usage: exportmax <1-2400>','err');
    return false;
  }
  exportMax=n;
  const input=document.getElementById('export-max');
  if(input)input.value=exportMax;
  if(!silent)log('Export max: '+exportMax+'px','ok');
  return true;
}

function updateExportBg(){
  const input=document.getElementById('export-bg');
  exportIncludeBg=!input||input.checked;
}

function slugifyName(name){
  const slug=String(name||'pixelforge').trim().replace(/[^\w.-]+/g,'_').replace(/^_+|_+$/g,'');
  return slug||'pixelforge';
}

function padFrameNumber(i){
  return String(i+1).padStart(3,'0');
}

function effectiveExportMax(){
  return Math.max(gridSize,Math.min(2400,exportMax));
}

function frameExportScale(){
  return Math.max(1,Math.floor(effectiveExportMax()/gridSize));
}

function renderFrameToCanvas(frameData,scale,includeBg=exportIncludeBg){
  const base=document.createElement('canvas');
  base.width=gridSize;
  base.height=gridSize;
  const bc=base.getContext('2d');
  if(includeBg&&bgColor!=='transparent'){
    bc.fillStyle=bgColor;
    bc.fillRect(0,0,gridSize,gridSize);
  }
  if(frameData)bc.putImageData(frameData,0,0);
  const out=document.createElement('canvas');
  out.width=gridSize*scale;
  out.height=gridSize*scale;
  const oc=out.getContext('2d');
  oc.imageSmoothingEnabled=false;
  oc.drawImage(base,0,0,out.width,out.height);
  return out;
}

function downloadCanvas(canvas,filename){
  canvas.toBlob(blob=>{
    if(!blob){log('Export failed: '+filename,'err');return;}
    const a=document.createElement('a');
    const url=URL.createObjectURL(blob);
    a.download=filename;
    a.href=url;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  },'image/png');
}

function exportPNG(){
  saveFrameData();
  const list=getActiveFrameList();
  const canvas=renderFrameToCanvas(list[currentFrame],frameExportScale());
  downloadCanvas(canvas,slugifyName(getActiveExportName())+'_'+padFrameNumber(currentFrame)+'.png');
  log('Exported frame PNG '+canvas.width+'x'+canvas.height,'ok');
}

function exportAllFrames(){
  saveFrameData();
  const list=getActiveFrameList();
  if(!list.length){log('No frames to export','err');return;}
  const scale=frameExportScale();
  const name=slugifyName(getActiveExportName());
  list.forEach((frame,i)=>{
    const canvas=renderFrameToCanvas(frame,scale);
    setTimeout(()=>downloadCanvas(canvas,name+'_'+padFrameNumber(i)+'.png'),i*120);
  });
  log('Exporting '+list.length+' PNG frames at '+(gridSize*scale)+'x'+(gridSize*scale),'ok');
}

function getSheetCols(){
  const input=document.getElementById('sheet-cols');
  const n=parseInt(input?.value);
  if(isNaN(n)||n<1)return 1;
  return Math.min(64,n);
}

function setSheetCols(value){
  const n=parseInt(value);
  if(isNaN(n)||n<1||n>64){log('Usage: spritesheet [cols 1-64] [max 1-2400]','err');return false;}
  const input=document.getElementById('sheet-cols');
  if(input)input.value=n;
  return true;
}

function fitSheetLayout(count,requestedCols){
  const max=effectiveExportMax();
  const maxBaseCols=Math.max(1,Math.floor(max/gridSize));
  let cols=Math.max(1,Math.min(requestedCols,count,maxBaseCols));
  let rows=Math.ceil(count/cols);
  if(rows*gridSize>max){
    let best=null;
    for(let c=1;c<=Math.min(count,maxBaseCols);c++){
      const r=Math.ceil(count/c);
      if(r*gridSize<=max){
        best={cols:c,rows:r};
        break;
      }
    }
    if(!best)return null;
    cols=best.cols;
    rows=best.rows;
  }
  const baseW=cols*gridSize;
  const baseH=rows*gridSize;
  return {cols,rows,scale:Math.max(1,Math.floor(max/Math.max(baseW,baseH)))};
}

function exportSpriteSheet(){
  saveFrameData();
  const list=getActiveFrameList();
  if(!list.length){log('No frames to export','err');return;}
  const layout=fitSheetLayout(list.length,getSheetCols());
  if(!layout){log('Spritesheet exceeds '+exportMax+'px at 1x; export fewer frames or a smaller canvas','err');return;}
  const cell=gridSize*layout.scale;
  const sheet=document.createElement('canvas');
  sheet.width=layout.cols*cell;
  sheet.height=layout.rows*cell;
  const sc=sheet.getContext('2d');
  sc.imageSmoothingEnabled=false;
  if(exportIncludeBg&&bgColor!=='transparent'){
    sc.fillStyle=bgColor;
    sc.fillRect(0,0,sheet.width,sheet.height);
  }
  list.forEach((frame,i)=>{
    const x=(i%layout.cols)*cell;
    const y=Math.floor(i/layout.cols)*cell;
    sc.drawImage(renderFrameToCanvas(frame,layout.scale,false),x,y);
  });
  downloadCanvas(sheet,slugifyName(getActiveExportName())+'_sheet.png');
  log('Exported spritesheet '+sheet.width+'x'+sheet.height+' cols '+layout.cols,'ok');
}

function hexByte(v){
  return v.toString(16).padStart(2,'0');
}

function readPixelMatrix(){
  const img=ctx.getImageData(0,0,gridSize,gridSize);
  const d=img.data;
  const rows=[];
  for(let y=0;y<gridSize;y++){
    const row=[];
    for(let x=0;x<gridSize;x++){
      const i=(y*gridSize+x)*4;
      const a=d[i+3];
      if(a===0)row.push(null);
      else if(a===255)row.push('#'+hexByte(d[i])+hexByte(d[i+1])+hexByte(d[i+2]));
      else row.push('#'+hexByte(d[i])+hexByte(d[i+1])+hexByte(d[i+2])+hexByte(a));
    }
    rows.push(row);
  }
  return rows;
}

function applyPixelMatrix(rows){
  ctx.clearRect(0,0,gridSize,gridSize);
  if(!Array.isArray(rows))throw new Error('Estado sin matriz de pixels');
  rows.forEach((row,y)=>{
    if(!Array.isArray(row))return;
    row.forEach((color,x)=>{
      if(color)paintPixel(x,y,color);
    });
  });
  saveFrameData();
}

function clonePixelRows(rows){
  return rows.map(row=>row.slice());
}

function pixelNeighbors(rows,x,y){
  const out=[];
  for(let yy=y-1;yy<=y+1;yy++){
    for(let xx=x-1;xx<=x+1;xx++){
      if(xx===x&&yy===y)continue;
      if(yy<0||xx<0||yy>=rows.length||xx>=rows[yy].length)continue;
      if(rows[yy][xx])out.push(rows[yy][xx]);
    }
  }
  return out;
}

function majorityColor(colors){
  const counts=new Map();
  colors.forEach(c=>counts.set(c,(counts.get(c)||0)+1));
  let best=null,bestCount=0;
  counts.forEach((count,color)=>{
    if(count>bestCount){best=color;bestCount=count;}
  });
  return {color:best,count:bestCount};
}

function smoothPixelRows(rows,passes=1){
  let current=clonePixelRows(rows);
  const h=current.length,w=current[0]?.length||0;
  for(let pass=0;pass<passes;pass++){
    const next=clonePixelRows(current);
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        const neighbors=pixelNeighbors(current,x,y);
        const majority=majorityColor(neighbors);
        if(!current[y][x]&&majority.count>=5)next[y][x]=majority.color;
        else if(current[y][x]&&majority.color&&majority.count>=6&&majority.color!==current[y][x])next[y][x]=majority.color;
        else if(current[y][x]&&neighbors.length<=1)next[y][x]=null;
      }
    }
    current=next;
  }
  return current;
}

function despecklePixelRows(rows,minSize=2){
  const h=rows.length,w=rows[0]?.length||0;
  const out=clonePixelRows(rows);
  const seen=Array.from({length:h},()=>Array(w).fill(false));
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      if(seen[y][x]||!rows[y][x])continue;
      const stack=[[x,y]],component=[];
      seen[y][x]=true;
      while(stack.length){
        const [cx,cy]=stack.pop();
        component.push([cx,cy]);
        dirs.forEach(([dx,dy])=>{
          const nx=cx+dx,ny=cy+dy;
          if(nx<0||ny<0||nx>=w||ny>=h||seen[ny][nx]||!rows[ny][nx])return;
          seen[ny][nx]=true;
          stack.push([nx,ny]);
        });
      }
      if(component.length<minSize)component.forEach(([cx,cy])=>{out[cy][cx]=null;});
    }
  }
  return out;
}

function outlinePixelRows(rows,color){
  const h=rows.length,w=rows[0]?.length||0;
  const out=clonePixelRows(rows);
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  for(let y=0;y<h;y++){
    for(let x=0;x<w;x++){
      if(!rows[y][x])continue;
      dirs.forEach(([dx,dy])=>{
        const nx=x+dx,ny=y+dy;
        if(nx>=0&&ny>=0&&nx<w&&ny<h&&!rows[ny][nx])out[ny][nx]=color;
      });
    }
  }
  return out;
}

function applyLoadedState(state){
  if(!state||typeof state!=='object')throw new Error('Estado inválido');
  const size=parseIntValue(state.gridSize);
  const validSizes=[16,32,48,64];
  if(size&&validSizes.includes(size)){
    document.getElementById('canvas-size').value=String(size);
  }
  if(state.mode==='pixelart'||state.mode==='sprite')setMode(state.mode);
  resizeCanvas();
  if(Array.isArray(state.categories)&&state.categories.length){
    categories=state.categories.map(name=>({name:String(name),frames:[]}));
    currentCat=Math.max(0,categories.findIndex(c=>c.name===state.currentCategory));
    if(currentCat<0)currentCat=0;
  }
  if(state.bgColor)setBgColor(state.bgColor);
  if(state.currentColor)setColor(state.currentColor);
  if(Number.isFinite(parseIntValue(state.currentAlpha))){
    currentAlpha=Math.max(0,Math.min(255,parseIntValue(state.currentAlpha)));
    document.getElementById('inp-alpha').value=currentAlpha;
  }
  if(Number.isFinite(parseIntValue(state.brushSize)))brushSize=Math.max(1,Math.min(32,parseIntValue(state.brushSize)));
  if(Number.isFinite(parseIntValue(state.strokeSize)))strokeSize=Math.max(1,Math.min(32,parseIntValue(state.strokeSize)));
  if(Number.isFinite(parseIntValue(state.exportMax)))setExportMax(Math.max(1,Math.min(2400,parseIntValue(state.exportMax))),true);
  applyPixelMatrix(state.pixels);
  renderFrameList();
  renderCats();
}

  }
  if(cols&&rest.length){

  }
  if(rest.length){

  }
  return true;
}

    fillPolygonPixels(parsed.points);
    saveFrameData();
    log('Fillpoly '+parsed.points.length+' points','ok');
  },
  arc:(args)=>{
    const parsed=splitTrailingColor(args);
    const values=parseNumberList(parsed.values);
    if(values.length!==6||values.some(v=>v===null)||values[2]<1||values[3]<1){log('Usage: arc <cx> <cy> <rx> <ry> <startDeg> <endDeg> [color]','err');return;}
    if(parsed.color)setColor(parsed.color);
    drawArcPixels(values[0],values[1],values[2],values[3],values[4],values[5]);
    saveFrameData();
    log('Arc ('+values[0]+','+values[1]+') '+values[4]+' -> '+values[5]+' stroke '+strokeSize,'ok');
  },
  curve:(args)=>{
    const parsed=splitTrailingColor(args);
    const values=parseNumberList(parsed.values);
    if(values.length!==6||values.some(v=>v===null)){log('Usage: curve <x0> <y0> <cx> <cy> <x1> <y1> [color]','err');return;}
    if(parsed.color)setColor(parsed.color);
    drawCurvePixels(values[0],values[1],values[2],values[3],values[4],values[5]);
    saveFrameData();
    log('Curve ('+values[0]+','+values[1]+') -> ('+values[4]+','+values[5]+') stroke '+strokeSize,'ok');
  },
  gradient:(args)=>{
    if(args.length<6||args.length>7){log('Usage: gradient <x> <y> <w> <h> <#from> <#to> [h|v]','err');return;}
    const values=parseNumberList(args.slice(0,4));
    const from=args[4],to=args[5],dir=(args[6]||'v').toLowerCase();
    if(values.some(v=>v===null)||values[2]<1||values[3]<1||!from.startsWith('#')||!to.startsWith('#')||(dir!=='h'&&dir!=='v')){log('Usage: gradient <x> <y> <w> <h> <#from> <#to> [h|v]','err');return;}
    drawGradientRect(values[0],values[1],values[2],values[3],from,to,dir);
    saveFrameData();
    log('Gradient ('+values[0]+','+values[1]+') '+values[2]+'x'+values[3]+' '+dir,'ok');
  },
  copy:([x,y,w,h])=>{
    const values=parseNumberList([x,y,w,h]);
    if(values.some(v=>v===null)||values[2]<1||values[3]<1){log('Usage: copy <x> <y> <w> <h>','err');return;}
    clipboardPixels=copySelection(values[0],values[1],values[2],values[3]);
    if(!clipboardPixels){log('Selection empty','err');return;}
    log('Copied '+clipboardPixels.width+'x'+clipboardPixels.height,'ok');
  },
  paste:([x,y])=>{
    const values=parseNumberList([x,y]);
    if(values.some(v=>v===null)){log('Usage: paste <x> <y>','err');return;}
    if(!clipboardPixels){log('Clipboard empty','err');return;}
    pasteSelection(values[0],values[1],clipboardPixels);
    saveFrameData();
    log('Pasted '+clipboardPixels.width+'x'+clipboardPixels.height+' at ('+values[0]+','+values[1]+')','ok');
  },
  translate:([x,y,w,h,dx,dy])=>{
    const values=parseNumberList([x,y,w,h,dx,dy]);
    if(values.some(v=>v===null)||values[2]<1||values[3]<1){log('Usage: translate <x> <y> <w> <h> <dx> <dy>','err');return;}
    const clip=copySelection(values[0],values[1],values[2],values[3]);
    if(!clip){log('Selection empty','err');return;}
    clearSelection(values[0],values[1],values[2],values[3]);
    pasteSelection(values[0]+values[4],values[1]+values[5],clip);
    saveFrameData();
    log('Translated '+clip.width+'x'+clip.height+' by ('+values[4]+','+values[5]+')','ok');
  },
  mirrorx:([x,y,w,h])=>{
    const values=parseNumberList([x,y,w,h]);
    if(values.some(v=>v===null)||values[2]<1||values[3]<1){log('Usage: mirrorx <x> <y> <w> <h>','err');return;}
    if(!mirrorSelection(values[0],values[1],values[2],values[3],'x')){log('Selection empty','err');return;}
    saveFrameData();
    log('Mirror X '+values[2]+'x'+values[3],'ok');
  },
  mirrory:([x,y,w,h])=>{
    const values=parseNumberList([x,y,w,h]);
    if(values.some(v=>v===null)||values[2]<1||values[3]<1){log('Usage: mirrory <x> <y> <w> <h>','err');return;}
    if(!mirrorSelection(values[0],values[1],values[2],values[3],'y')){log('Selection empty','err');return;}
    saveFrameData();
    log('Mirror Y '+values[2]+'x'+values[3],'ok');
  },
  rotate90:([x,y,w,h,dir='cw'])=>{
    const values=parseNumberList([x,y,w,h]);
    dir=String(dir||'cw').toLowerCase();
    if(values.some(v=>v===null)||values[2]<1||values[3]<1||(dir!=='cw'&&dir!=='ccw')){log('Usage: rotate90 <x> <y> <w> <h> [cw|ccw]','err');return;}
    if(!rotateSelection90(values[0],values[1],values[2],values[3],dir)){log('Selection empty','err');return;}
    saveFrameData();
    log('Rotate90 '+dir+' '+values[2]+'x'+values[3],'ok');
  },
  smoothpixels:([passes='1'])=>{
    const n=parseInt(passes);
    if(isNaN(n)||n<1||n>8){log('Usage: smoothpixels [passes 1-8]','err');return;}
    applyRowsOperation(smoothPixelRows(readPixelMatrix(),n));
    log('Smoothpixels passes '+n,'ok');
  },
  despeckle:([minSize='2'])=>{
    const n=parseInt(minSize);
    if(isNaN(n)||n<1||n>64){log('Usage: despeckle [minSize 1-64]','err');return;}
    applyRowsOperation(despecklePixelRows(readPixelMatrix(),n));
    log('Despeckle min '+n,'ok');
  },
  outline:([color])=>{
    const c=color||'#000000';
    if(c!=='transparent'&&!c.startsWith('#')){log('Usage: outline <#hex>','err');return;}
    applyRowsOperation(outlinePixelRows(readPixelMatrix(),c));
    log('Outline '+c,'ok');
  },
  getstate:()=>{
    const state={mode,gridSize,currentColor,currentAlpha,brushSize,strokeSize,exportMax,bgColor,currentFrame,tool,frameCount:getActiveFrameList().length,categories:categories.map(c=>c.name)};
    log(JSON.stringify(state),'info');
  },
  setpixels:(args)=>{
    let changed=false;
    for(let i=0;i<args.length-2;i+=3){
      const x=parseInt(args[i]),y=parseInt(args[i+1]),c=args[i+2];
      if(c)setColor(c);
      changed=paintPixel(x,y)||changed;
    }
    if(changed)saveFrameData();
    log('Batch pixels done','ok');
  },
  snapshot:async([id,scale])=>{
    const capture=captureId(id);
    const n=clampSnapshotScale(scale);
    await pushSnapshot(capture,n);
  },
  statepush:async([id])=>{
    const capture=captureId(id);
    await pushState(capture);
  },
  loadstate:async([id])=>{
    const state=await fetchSavedState(id||'current');
    applyLoadedState(state);
    log('State loaded: '+(id||'current'),'ok');
  },
  loadpixels:async([id])=>{
    const state=await fetchSavedState(id||'current');
    applyRowsOperation(state.pixels);
    log('Pixels loaded: '+(id||'current'),'ok');
  }
};

function execCmd(raw){
  const parts=raw.trim().split(/\s+/);
  const cmd=parts[0].toLowerCase();
  const args=parts.slice(1);
  if(COMMANDS[cmd]){
    try{
      const result=COMMANDS[cmd](args);
      if(result&&typeof result.catch==='function')result.catch(e=>log(e.message||String(e),'err'));
    }catch(e){
      log(e.message||String(e),'err');
    }
  } else log('Unknown command: '+cmd+' (type help)','err');
}

function handleTermKey(e){
  if(e.key==='Enter'){
    const val=document.getElementById('term-input').value.trim();
    if(!val)return;
    log('$ '+val,'info');
    execCmd(val);
    document.getElementById('term-input').value='';
  }
}

init();
log('PixelForge ready. Type "help" for commands.','ok');
log('AI API: use terminal commands to control everything.','info');

// Polling al servidor local cuando corre desde localhost
function startPolling(){
  const base=location.origin;
  if(!base.includes('localhost')&&!base.includes('127.0.0.1'))return;
  setInterval(async()=>{
    try{
      const r=await fetch(base+'/poll');
      const d=await r.json();
      (d.commands||[]).forEach(cmd=>{
        log('$ '+cmd,'info');
        execCmd(cmd);
      });
    }catch(e){}
  },300);
  log('Polling activo — servidor en '+base,'info');
}
startPolling();
</script>
